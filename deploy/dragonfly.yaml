apiVersion: v1
kind: Service
metadata:
  name: dragonfly
  namespace: velox
  labels:
    app.kubernetes.io/name: dragonfly
    app.kubernetes.io/part-of: velox
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: dragonfly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragonfly
  namespace: velox
  labels:
    app.kubernetes.io/name: dragonfly
    app.kubernetes.io/part-of: velox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dragonfly
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dragonfly
        app.kubernetes.io/part-of: velox
    spec:
      containers:
        - name: dragonfly
          image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.23.1
          imagePullPolicy: IfNotPresent
          args: ["--bind", "0.0.0.0", "--port", "6379"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 20
            periodSeconds: 20
