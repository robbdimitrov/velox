apiVersion: batch/v1
kind: Job
metadata:
  name: broker-topics-init
  labels:
    app.kubernetes.io/name: broker-topics-init
    app.kubernetes.io/part-of: velox
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broker-topics-init
        app.kubernetes.io/part-of: velox
    spec:
      restartPolicy: OnFailure
      serviceAccountName: broker-topics-init
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-topics
          image: redpandadata/redpanda:v24.2.9
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem omitted: rpk writes /etc/redpanda/redpanda.yaml on start.
            capabilities:
              drop:
                - ALL
          # Retry transient NetworkPolicy propagation failures. Other rpk
          # errors are treated as idempotent topic-exists outcomes.
          command:
            - /bin/sh
            - -c
            - |
              topics="order.events.v1 inventory.events.v1 dlq.order.events.v1 dlq.inventory.events.v1"
              broker="broker:9092"
              attempt=0
              max_attempts=15
              while :; do
                attempt=$((attempt + 1))
                output=$(rpk topic create $topics --brokers="$broker" 2>&1)
                status=$?
                echo "$output"
                if [ "$status" -eq 0 ]; then
                  exit 0
                fi
                if ! echo "$output" | grep -q "unable to dial\|connection refused"; then
                  exit 0
                fi
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "giving up after $max_attempts attempts: broker unreachable" >&2
                  exit 1
                fi
                echo "attempt $attempt: broker unreachable, retrying in 2s"
                sleep 2
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
