apiVersion: v1
kind: Service
metadata:
  name: cache
  labels:
    app.kubernetes.io/name: cache
    app.kubernetes.io/part-of: velox
spec:
  ports:
    - name: cache
      port: 6379
      targetPort: cache
  selector:
    app.kubernetes.io/name: cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  labels:
    app.kubernetes.io/name: cache
    app.kubernetes.io/part-of: velox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cache
        app.kubernetes.io/part-of: velox
    spec:
      serviceAccountName: cache
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cache
          image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.23.1
          imagePullPolicy: IfNotPresent
          args: ["--bind", "0.0.0.0", "--port", "6379", "--proactor_threads", "1", "--maxmemory", "256mb"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: cache
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: cache
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: cache
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
