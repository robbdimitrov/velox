apiVersion: v1
kind: ConfigMap
metadata:
  name: velox-database-config
  namespace: velox
data:
  POSTGRES_DB: velox
  POSTGRES_USER: velox
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: velox
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: velox
spec:
  ports:
    - name: database
      port: 5432
      targetPort: database
  selector:
    app.kubernetes.io/name: database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: velox
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: velox
spec:
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database
        app.kubernetes.io/part-of: velox
    spec:
      containers:
        - name: database
          image: ghcr.io/example/velox-database:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: database
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: velox-database-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velox-database-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "velox", "-d", "velox"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "velox", "-d", "velox"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: database-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: database-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
