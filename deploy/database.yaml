apiVersion: v1
kind: ConfigMap
metadata:
  name: velox-database-config
data:
  POSTGRES_DB: velox
  POSTGRES_USER: velox
---
apiVersion: v1
kind: Service
metadata:
  name: database
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: velox
spec:
  ports:
    - name: database
      port: 5432
      targetPort: database
  selector:
    app.kubernetes.io/name: database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: velox
spec:
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database
        app.kubernetes.io/part-of: velox
    spec:
      serviceAccountName: database
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: database-volume-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "chown -R 70:70 /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          volumeMounts:
            - name: database-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: database
          image: ghcr.io/example/velox-database:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem omitted: postgres writes PGDATA and socket/PID files.
            capabilities:
              drop:
                - ALL
          ports:
            - name: database
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: velox-database-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velox-database-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "velox", "-d", "velox"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "velox", "-d", "velox"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: database-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: database-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
