apiVersion: v1
kind: ConfigMap
metadata:
  name: velox-service-config
  namespace: velox
data:
  KAFKA_BROKERS: broker.velox.svc.cluster.local:9092
  REDIS_ADDR: cache.velox.svc.cluster.local:6379
  PUBLIC_GATEWAY_BASE_URL: http://localhost:8081
  ORDER_EVENTS_TOPIC: order.events.v1
  INVENTORY_EVENTS_TOPIC: inventory.events.v1
  POSTGRES_DB: velox
  POSTGRES_USER: velox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velox-runtime
  namespace: velox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  namespace: velox
  labels:
    app.kubernetes.io/name: apigateway
    app.kubernetes.io/part-of: velox
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: apigateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apigateway
        app.kubernetes.io/part-of: velox
    spec:
      serviceAccountName: velox-runtime
      containers:
        - name: apigateway
          image: ghcr.io/example/velox-apigateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: velox-service-config
          env:
            - name: ORDER_SERVICE_ADDR
              value: orderservice.velox.svc.cluster.local:9000
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velox-database-secret
                  key: password
            - name: DATABASE_URL
              value: user=velox password=$(DATABASE_PASSWORD) host=database.velox.svc.cluster.local port=5432 dbname=velox sslmode=disable
            - name: VELOX_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: velox-auth-secret
                  key: session-secret
            - name: JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: velox-auth-secret
                  key: issuer
            - name: JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: velox-auth-secret
                  key: audience
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway
  namespace: velox
spec:
  selector:
    app.kubernetes.io/name: apigateway
  ports:
    - name: http
      port: 80
      targetPort: http
---
