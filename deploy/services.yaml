apiVersion: v1
kind: ConfigMap
metadata:
  name: velox-service-config
data:
  KAFKA_BROKERS: broker:9092
  REDIS_ADDR: cache:6379
  ORDER_EVENTS_TOPIC: order.events.v1
  INVENTORY_EVENTS_TOPIC: inventory.events.v1
  POSTGRES_DB: velox
  POSTGRES_USER: velox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  labels:
    app.kubernetes.io/name: apigateway
    app.kubernetes.io/part-of: velox
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apigateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apigateway
        app.kubernetes.io/part-of: velox
    spec:
      serviceAccountName: apigateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apigateway
          image: ghcr.io/example/velox-apigateway:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: velox-service-config
          env:
            - name: ORDER_SERVICE_ADDR
              value: orderservice:9000
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velox-database-secret
                  key: password
            - name: DATABASE_URL
              value: user=velox password=$(DATABASE_PASSWORD) host=database port=5432 dbname=velox sslmode=disable
            - name: VELOX_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: velox-auth-secret
                  key: session-secret
            - name: JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: velox-auth-secret
                  key: issuer
            - name: JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: velox-auth-secret
                  key: audience
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway
spec:
  selector:
    app.kubernetes.io/name: apigateway
  ports:
    - name: http
      port: 80
      targetPort: http
---
