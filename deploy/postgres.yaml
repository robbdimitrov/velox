apiVersion: v1
kind: ConfigMap
metadata:
  name: velox-postgres-config
  namespace: velox
data:
  POSTGRES_DB: velox
  POSTGRES_USER: velox
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: velox
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: velox
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: velox
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: velox
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: velox
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: velox-postgres-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velox-postgres-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "velox", "-d", "velox"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "velox", "-d", "velox"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
