apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: velox
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: velox
spec:
  clusterIP: None
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: admin
      port: 9644
      targetPort: admin
  selector:
    app.kubernetes.io/name: redpanda
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: velox
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: velox
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/part-of: velox
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.9
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/rpk
            - redpanda
            - start
            - --mode=dev-container
            - --overprovisioned
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda.velox.svc.cluster.local:9092
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
